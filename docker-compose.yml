
services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=8080
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    networks:
      - redforge_net

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./backend/src:/app/src
      - ./reports:/app/reports
      - /app/node_modules
    depends_on:
      - mongo
      - redis
    networks:
      - redforge_net

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - redforge_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - redforge_net

  engine:
    build:
      context: ./engine
    ports:
      - "8000:8000"
    env_file:
      - ./engine/.env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./engine/src:/app/src
    networks:
      - redforge_net

networks:
  redforge_net:

volumes:
  mongo_data:
